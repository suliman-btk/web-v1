<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="16" fill="#F0FDF4"/>
  <!-- power adapter body -->
  <rect x="18" y="22" width="28" height="20" rx="5" fill="#15803D"/>
  <rect x="22" y="26" width="20" height="12" rx="3" fill="#16A34A"/>
  <!-- prongs (top) -->
  <rect x="27" y="14" width="5"  height="10" rx="2" fill="#15803D"/>
  <rect x="35" y="14" width="5"  height="10" rx="2" fill="#15803D"/>
  <!-- cable out bottom -->
  <path d="M 32 42 Q 32 50 20 56" stroke="#15803D" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- USB-C tip -->
  <rect x="12" y="52" width="16" height="8" rx="3" fill="#16A34A"/>
  <rect x="14" y="54" width="12" height="4" rx="2" fill="#4ADE80"/>
  <!-- connector center pin -->
  <rect x="19" y="55" width="2"  height="2" rx=".5" fill="#15803D"/>
  <!-- LED indicator -->
  <circle cx="32" cy="32" r="3" fill="#4ADE80"/>
  <!-- brand stripe -->
  <rect x="22" y="30" width="20" height="3" rx="1" fill="#14532D"/>
</svg>
