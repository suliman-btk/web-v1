  <!-- left ear cup -->
  <rect x="7"  y="36" width="14" height="20" rx="7"  fill="#5B21B6"/>
  <rect x="10" y="40" width="8"  height="12" rx="4"  fill="#7C3AED"/>
  <rect x="11" y="41" width="6"  height="10" rx="3"  fill="#EDE9FE"/>
  <!-- right ear cup -->
  <rect x="43" y="36" width="14" height="20" rx="7"  fill="#5B21B6"/>
  <rect x="46" y="40" width="8"  height="12" rx="4"  fill="#7C3AED"/>
  <rect x="47" y="41" width="6"  height="10" rx="3"  fill="#EDE9FE"/>
  <!-- sound waves -->
  <path d="M 28 24 Q 32 20 36 24" stroke="#7C3AED" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 25 21 Q 32 14 39 21" stroke="#A78BFA" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 22 18 Q 32 8  42 18" stroke="#C4B5FD" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
