  <line x1="38"   y1="38.5" x2="49" y2="38.5" stroke="#0891B2" stroke-width="1"/>
  <!-- wifi -->
  <path d="M 28 22 Q 32 19 36 22" stroke="#E0F2FE" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 25 19 Q 32 14 39 19" stroke="#BAE6FD" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="32" cy="26" r="2" fill="#E0F2FE"/>
