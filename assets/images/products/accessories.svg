<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Accessories">
  <rect width="400" height="300" fill="#F0FDF4"/>
  <!-- glow -->
  <circle cx="200" cy="145" r="90" fill="#DCFCE7"/>
  <!-- USB-C cable plug body -->
  <rect x="155" y="118" width="90" height="50" rx="10" fill="#15803D"/>
  <rect x="163" y="126" width="74" height="34" rx="6" fill="#16A34A"/>
  <!-- USB-C port opening -->
  <rect x="176" y="134" width="48" height="18" rx="4" fill="#14532D"/>
  <!-- connector pins suggestion -->
  <rect x="182" y="138" width="6" height="10" rx="2" fill="#4ADE80"/>
  <rect x="193" y="138" width="6" height="10" rx="2" fill="#4ADE80"/>
  <rect x="204" y="138" width="6" height="10" rx="2" fill="#4ADE80"/>
  <rect x="215" y="138" width="6" height="10" rx="2" fill="#4ADE80"/>
  <!-- cable wire going down-left -->
  <path d="M 175 168 Q 155 185 140 200 Q 125 215 120 240" stroke="#15803D" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- cable wire going down-right -->
  <path d="M 225 168 Q 245 185 260 200 Q 275 215 280 240" stroke="#15803D" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- left plug tip -->
  <rect x="108" y="230" width="28" height="18" rx="6" fill="#16A34A"/>
  <rect x="112" y="234" width="20" height="10" rx="3" fill="#4ADE80"/>
  <!-- right plug tip (USB-A style) -->
  <rect x="264" y="230" width="28" height="18" rx="4" fill="#16A34A"/>
  <rect x="268" y="234" width="20" height="10" rx="3" fill="#4ADE80"/>
  <!-- power bolt icon on plug -->
  <rect x="166" y="100" width="68" height="18" rx="6" fill="#22C55E"/>
  <text x="200" y="114" font-size="12" font-family="Arial,sans-serif" font-weight="700" fill="#14532D" text-anchor="middle">FAST CHARGE</text>
  <!-- small spark indicators -->
  <text x="144" y="130" font-size="18" font-family="Arial,sans-serif" fill="#4ADE80">⚡</text>
  <text x="242" y="130" font-size="18" font-family="Arial,sans-serif" fill="#4ADE80">⚡</text>
</svg>
