<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Audio">
  <rect width="400" height="300" fill="#F5F3FF"/>
  <!-- glow -->
  <circle cx="200" cy="140" r="90" fill="#EDE9FE"/>
  <!-- headband arc -->
  <path d="M 130 160 A 70 70 0 0 1 270 160" stroke="#4C1D95" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- headband highlight -->
  <path d="M 135 157 A 65 65 0 0 1 265 157" stroke="#7C3AED" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- left ear cup outer -->
  <rect x="108" y="155" width="44" height="64" rx="22" fill="#5B21B6"/>
  <!-- left ear cup inner -->
  <rect x="118" y="165" width="24" height="44" rx="12" fill="#7C3AED"/>
  <!-- left ear cushion -->
  <rect x="120" y="167" width="20" height="40" rx="10" fill="#EDE9FE"/>
  <!-- right ear cup outer -->
  <rect x="248" y="155" width="44" height="64" rx="22" fill="#5B21B6"/>
  <!-- right ear cup inner -->
  <rect x="258" y="165" width="24" height="44" rx="12" fill="#7C3AED"/>
  <!-- right ear cushion -->
  <rect x="260" y="167" width="20" height="40" rx="10" fill="#EDE9FE"/>
  <!-- mic boom left -->
  <path d="M 118 210 Q 100 225 105 245" stroke="#4C1D95" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="105" cy="248" r="6" fill="#7C3AED"/>
  <!-- sound waves (decorative) -->
  <path d="M 195 125 Q 200 115 205 125" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 188 120 Q 200 104 212 120" stroke="#A78BFA" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 181 114 Q 200 92 219 114" stroke="#C4B5FD" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
