<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Smart Home">
  <rect width="400" height="300" fill="#ECFEFF"/>
  <!-- glow -->
  <circle cx="200" cy="145" r="90" fill="#CFFAFE"/>
  <!-- roof -->
  <polygon points="200,55 105,145 295,145" fill="#0891B2"/>
  <!-- roof highlight -->
  <polygon points="200,55 200,145 295,145" fill="#06B6D4"/>
  <!-- chimney -->
  <rect x="236" y="75" width="18" height="36" rx="3" fill="#0E7490"/>
  <!-- house body -->
  <rect x="118" y="142" width="164" height="108" rx="4" fill="#0E7490"/>
  <!-- house body right panel (lighter) -->
  <rect x="200" y="142" width="82" height="108" rx="0 4 4 0" fill="#0891B2"/>
  <!-- door -->
  <rect x="178" y="196" width="44" height="54" rx="6" fill="#083344"/>
  <!-- door knob -->
  <circle cx="217" cy="223" r="4" fill="#06B6D4"/>
  <!-- left window -->
  <rect x="130" y="160" width="36" height="30" rx="4" fill="#CFFAFE"/>
  <line x1="148" y1="160" x2="148" y2="190" stroke="#0891B2" stroke-width="2"/>
  <line x1="130" y1="175" x2="166" y2="175" stroke="#0891B2" stroke-width="2"/>
  <!-- right window -->
  <rect x="234" y="160" width="36" height="30" rx="4" fill="#CFFAFE"/>
  <line x1="252" y1="160" x2="252" y2="190" stroke="#0891B2" stroke-width="2"/>
  <line x1="234" y1="175" x2="270" y2="175" stroke="#0891B2" stroke-width="2"/>
  <!-- wifi signal on house -->
  <path d="M 193 94 Q 200 88 207 94" stroke="#E0F2FE" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 187 88 Q 200 78 213 88" stroke="#BAE6FD" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="200" cy="100" r="4" fill="#E0F2FE"/>
</svg>
