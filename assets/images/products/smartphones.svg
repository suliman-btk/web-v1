<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Smartphones">
  <rect width="400" height="300" fill="#EFF6FF"/>
  <!-- glow circle -->
  <circle cx="200" cy="140" r="90" fill="#DBEAFE"/>
  <!-- phone body -->
  <rect x="148" y="60" width="104" height="176" rx="16" fill="#1D4ED8"/>
  <!-- screen -->
  <rect x="158" y="80" width="84" height="132" rx="8" fill="#EFF6FF"/>
  <!-- screen content -->
  <rect x="168" y="94" width="64" height="8" rx="4" fill="#93C5FD"/>
  <rect x="168" y="108" width="48" height="6" rx="3" fill="#BFDBFE"/>
  <rect x="168" y="120" width="56" height="6" rx="3" fill="#BFDBFE"/>
  <rect x="168" y="134" width="40" height="6" rx="3" fill="#BFDBFE"/>
  <!-- app grid -->
  <rect x="168" y="150" width="18" height="18" rx="4" fill="#2563EB"/>
  <rect x="191" y="150" width="18" height="18" rx="4" fill="#0EA5E9"/>
  <rect x="214" y="150" width="18" height="18" rx="4" fill="#06B6D4"/>
  <rect x="168" y="173" width="18" height="18" rx="4" fill="#7C3AED"/>
  <rect x="191" y="173" width="18" height="18" rx="4" fill="#2563EB"/>
  <rect x="214" y="173" width="18" height="18" rx="4" fill="#0EA5E9"/>
  <!-- home indicator -->
  <rect x="184" y="204" width="32" height="4" rx="2" fill="#93C5FD"/>
  <!-- front camera -->
  <circle cx="200" cy="72" r="4" fill="#93C5FD"/>
  <!-- speaker -->
  <rect x="186" y="68" width="28" height="4" rx="2" fill="#3B82F6"/>
</svg>
